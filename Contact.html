<style>
    .disk{
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background:url("art3.jpg") center/cover;
        cursor: pointer;
    }
    .disk.playing {
        animation: spin 2s linear infinite;
    }
    @keyframes spin {
        from { transform: rotate(0deg) ;}
        to { transform: rotate(360deg);}
    }
    </style>

    <audio id="audio" src="[prod. Frozy x warheart].mp3" loop></audio>
    <div class="disk" onclick="togglePlay()"></div>
<a href="https://youtu.be/UTbWGBZJ32U?si=t8pGLwEJiraXcCG5" target="_blank"> [Prod. frozy x warheart]</a>
    <script>
        const audio = document.getElementById("audio");
        const disk = document.querySelector(".disk");

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                disk.classList.add("playing");
            } else {
                audio.pause();
                disk.classList.remove("playing");
            }
        }
    </script>
